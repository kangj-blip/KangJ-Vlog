<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Vlog</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e6e6;
      --muted: #9aa3b2;
      --accent: #7c9cff;
      --border: #262b36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      background: rgba(15,17,21,0.7);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      z-index: 10;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 13px; color: var(--muted); }

    .admin-btn {
      font-size:12px;
      background:none;
      border:1px solid var(--border);
      color:var(--muted);
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
    }

    main {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px 80px;
    }

    .post {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 20px;
      transition: 0.2s ease;
    }

    .post:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .post-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .post-date {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .post-content {
      white-space: pre-wrap;
    }

    .editor {
      display:none;
      margin-bottom:30px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      background: #0c0e13;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    textarea { min-height: 120px; resize: vertical; }

    button.publish {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="title">J Kang's Personal Vlog</div>
    <div class="subtitle">My thoughts, goals, reviews on books, movies, and random things.</div>
  </div>
  <button class="admin-btn" onclick="unlock()">admin</button>
</header>

<main>

<div id="editor" class="editor">
  <strong>New Post</strong>
  <input id="title" placeholder="Title" />
  <textarea id="content" placeholder="Write your vlog..."></textarea>
  <button class="publish" onclick="addPost()">Publish</button>
</div>

<div id="posts"></div>

<div class="footer">hosted on github pages</div>

</main>

<script>

const ADMIN_PASSWORD = "Kang2007";

const posts = [
  {
    title: "First Post",
    date: "Welcome",
    content: "This is your vlog. Edit index.html to remove this post."
  }
];

function unlock() {
  const pass = prompt("password");
  if (pass === ADMIN_PASSWORD) {
    document.getElementById("editor").style.display = "block";
  }
}

function addPost() {
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();

  if (!title || !content) return;

  posts.unshift({
    title,
    content,
    date: new Date().toLocaleString()
  });

  render();

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
}

function render() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(post => {
    const el = document.createElement("div");
    el.className = "post";

    el.innerHTML = `
      <div class="post-title">${post.title}</div>
      <div class="post-date">${post.date}</div>
      <div class="post-content">${post.content}</div>
    `;

    container.appendChild(el);
  });
}

render();
</script>

</body>
</html>
